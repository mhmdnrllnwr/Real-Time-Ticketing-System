<!DOCTYPE html><html><head><title>Ticketing</title><style>
body{font-family:'Segoe UI',sans-serif;background:#0d0d0d;color:#e0e0e0;text-align:center;padding:40px;margin:0}
.container{max-width:600px;margin:0 auto}
h2{letter-spacing:2px;font-weight:300;text-transform:uppercase;color:#fff}
#msg{height:20px;font-size:14px;color:#888;transition:color 0.3s;margin-bottom:30px}

/* Glowing screen effect */
.screen{height:4px;background:#4facfe;box-shadow:0 10px 30px rgba(79,172,254,0.4);margin:0 auto 40px;border-radius:2px;width:80%}

.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;perspective:1000px}

/* Enhanced interactive seat styling */
.seat{aspect-ratio:1;background:#222;border:1px solid #333;border-radius:8px 8px 4px 4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#555;transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1);box-shadow:inset 0 2px 5px rgba(0,0,0,0.5)}
.seat:hover:not(.x):not(.mine){background:#333;transform:translateY(-2px);border-color:#444;color:#aaa}
.mine{background:linear-gradient(145deg,#2e7d32,#1b5e20)!important;border-color:#4caf50;color:#fff;box-shadow:0 0 10px rgba(76,175,80,0.4);transform:scale(1.05)}

/* UPDATED: Red for unavailable seats */
.x{background:linear-gradient(145deg,#d32f2f,#b71c1c)!important;border-color:#f44336;color:#fff;opacity:0.8;cursor:not-allowed}

/* Clean Legend */
.legend{display:flex;justify-content:center;gap:20px;margin-top:40px;font-size:12px;color:#666}
.leg-item{display:flex;align-items:center;gap:8px}
.dot{width:12px;height:12px;border-radius:3px}
</style></head><body>

<div class="container">
    <h2>TICKET RESERVATION</h2>
    <p id="msg">Select your preferred seating</p>
    
    <div class="screen"></div>
    <div class="grid" id="grid"></div>
    
    <div class="legend">
        <div class="leg-item"><div class="dot" style="background:#222;border:1px solid #333"></div> Available</div>
        <div class="leg-item"><div class="dot" style="background:#2e7d32"></div> Selected</div>
        <div class="leg-item"><div class="dot" style="background:#d32f2f"></div> Unavailable</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script><script>
const socket = io(), grid = document.getElementById('grid'), msg = document.getElementById('msg');
const setMsg = (t, c='#888') => { 
    msg.innerText = t; 
    msg.style.color = c; 
    setTimeout(() => {msg.innerText = 'Select your preferred seating'; msg.style.color = '#888'}, 3000); 
};

for(let i=1; i<=32; i++){
    let s = document.createElement('div'); s.className = 'seat'; s.id = i; s.innerText = i;
    
    s.onclick = () => {
        // Add a satisfying "click/press" animation
        s.style.transform = 'scale(0.90)'; 
        setTimeout(()=> s.style.transform = '', 150); 
        
        if (s.className.includes('mine')) socket.emit('unlock', i);
        else if (!s.className.includes('x')) socket.emit('lock', i);
    };
    grid.appendChild(s);
}

socket.on('init', l => l.forEach(id => document.getElementById(id).classList.add('x')));
socket.on('ok', id => { document.getElementById(id).classList.add('mine'); setMsg(`Seat ${id} secured.`, '#4caf50'); });
socket.on('err', e => setMsg(e, '#f44336'));
socket.on('locked', id => document.getElementById(id).classList.add('x'));
socket.on('free', id => document.getElementById(id).classList.remove('x', 'mine'));
</script></body></html>
